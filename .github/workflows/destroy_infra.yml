name: Destroy resources in AWS (Only for test)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

env:
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-destroy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ env.DEPLOY_ENV }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="vpc-${{ env.DEPLOY_ENV }}-terraform-state-${ACCOUNT_ID}"
          TABLE_NAME="vpc-${{ env.DEPLOY_ENV }}-terraform-locks-${ACCOUNT_ID}"
          
          terraform init \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="dynamodb_table=${TABLE_NAME}"

      - name: Terraform Destroy
        working-directory: ./terraform/environments/${{ env.DEPLOY_ENV }}
        run: |
          terraform destroy -auto-approve -var-file="terraform.tfvars"
      - name: Cleanup Terraform Backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="vpc-${{ env.DEPLOY_ENV }}-terraform-state-${ACCOUNT_ID}"
          TABLE_NAME="vpc-${{ env.DEPLOY_ENV }}-terraform-locks-${ACCOUNT_ID}"

          echo "Emptying all object versions from $BUCKET_NAME..."
          aws s3api list-object-versions --bucket "$BUCKET_NAME" \
            --output text \
            --query 'Versions[*].[Key,VersionId]' | \
            while read -r key version; do
              if [ -n "$key" ] && [ "$key" != "None" ]; then
                aws s3api delete-object --bucket "$BUCKET_NAME" --key "$key" --version-id "$version"
              fi
            done

          echo "Emptying all delete markers from $BUCKET_NAME..."
          aws s3api list-object-versions --bucket "$BUCKET_NAME" \
            --output text \
            --query 'DeleteMarkers[*].[Key,VersionId]' | \
            while read -r key version; do
              if [ -n "$key" ] && [ "$key" != "None" ]; then
                aws s3api delete-object --bucket "$BUCKET_NAME" --key "$key" --version-id "$version"
              fi
            done

          echo "Deleting the empty bucket..."
          aws s3 rb s3://$BUCKET_NAME --force
          
          echo "Deleting DynamoDB table..."
          aws dynamodb delete-table --table-name $TABLE_NAME --region ${{ env.AWS_REGION }}
          
          echo "Cleanup backend successfully!"