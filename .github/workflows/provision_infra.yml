name: Provision resources to aws

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
      run_apply:
        description: 'Apply after plan'
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'

env:
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'dev' }}
  RUN_APPLY : ${{ github.event.inputs.run_apply || 'no' }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Provision resources to AWS
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
    
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d0834ad3a60a024346910e522a81b0002bd37fea
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gh-infra

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.4
      
      - name: Setup Terraform Backend (S3 + DynamoDB)
        run: |
          ENV="${{ env.DEPLOY_ENV }}"
          if [ -z "$ENV" ]; then ENV=dev; fi
          AWS_REGION="${{ env.AWS_REGION }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_BASE="vpc-${ENV}-terraform-state"
          TABLE_BASE="vpc-${ENV}-terraform-locks"
          BUCKET_NAME="${BUCKET_BASE}-${ACCOUNT_ID}"
          TABLE_NAME="${TABLE_BASE}-${ACCOUNT_ID}"
          
          echo "Environment: ${ENV}"
          echo "Bucket: ${BUCKET_NAME}"
          echo "DynamoDB: ${TABLE_NAME}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "S3 bucket already exists: $BUCKET_NAME"
          else
            echo "Creating S3 bucket: $BUCKET_NAME"
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET_NAME" \
              --versioning-configuration Status=Enabled
            
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET_NAME" \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  },
                  "BucketKeyEnabled": true
                }]
              }'
            echo "S3 bucket created successfully"
          fi
          echo "Ensuring SSL-only policy on bucket: $BUCKET_NAME"
          aws s3api put-bucket-policy \
            --bucket "$BUCKET_NAME" \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "DenyInsecureTransport",
                  "Effect": "Deny",
                  "Principal": "*",
                  "Action": "s3:*",
                  "Resource": [
                    "arn:aws:s3:::'"$BUCKET_NAME"'",
                    "arn:aws:s3:::'"$BUCKET_NAME"'/*"
                  ],
                  "Condition": {
                    "Bool": {
                      "aws:SecureTransport": "false"
                    }
                  }
                }
              ]
            }'
            if aws dynamodb describe-table --table-name "$TABLE_NAME" 2>/dev/null; then
            echo "DynamoDB table already exists: $TABLE_NAME"
          else
            echo "Creating DynamoDB table: $TABLE_NAME"
            aws dynamodb create-table \
              --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$TABLE_NAME" --region "$AWS_REGION"
            echo "DynamoDB table created successfully"
          fi

      - name: Terraform Init
        working-directory: ./terraform/environments/${{ env.DEPLOY_ENV }}
        run: |
          ENV="${{ env.DEPLOY_ENV }}"
          if [ -z "$ENV" ]; then ENV=dev; fi
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_BASE="vpc-${ENV}-terraform-state"
          TABLE_BASE="vpc-${ENV}-terraform-locks"
          BUCKET_NAME="${BUCKET_BASE}-${ACCOUNT_ID}"
          TABLE_NAME="${TABLE_BASE}-${ACCOUNT_ID}"

          echo "Initializing Terraform..."
          echo "Bucket: ${BUCKET_NAME}"
          echo "Table: ${TABLE_NAME}"
          
          terraform init \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="dynamodb_table=${TABLE_NAME}"

      - name: Terraform Validate
        working-directory: ./terraform/environments/${{ env.DEPLOY_ENV }}
        run: |
          terraform validate
          echo "Terraform configuration validated successfully!"
      
      - name: Terraform Plan
        id: plan
        working-directory: ./terraform/environments/${{ env.DEPLOY_ENV }}
        run: |
          terraform plan -var-file="terraform.tfvars" -out=tfplan
          echo "Terraform plan created successfully!"

      - name: Terraform Apply
        if: env.RUN_APPLY == 'yes'
        working-directory: ./terraform/environments/${{ env.DEPLOY_ENV }}
        run: |
          terraform apply -auto-approve tfplan
          echo "Terraform apply completed successfully!"



      
